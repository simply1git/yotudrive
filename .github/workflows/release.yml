name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run core test gates
        shell: pwsh
        run: |
          python -m unittest tests.test_core_engine tests.test_web_api_smoke tests.test_header_v5_module tests.test_settings_module tests.test_decoder_detection tests.test_encoder_executor_selection
          python tests/test_full_cycle.py

      - name: Build executable
        shell: pwsh
        run: |
          python build_exe.py

      - name: Package build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/YotuDrive")) {
            throw "dist/YotuDrive not found"
          }

          $zipName = "YotuDrive-${{ github.ref_name }}-windows-x64.zip"
          if (Test-Path $zipName) {
            Remove-Item $zipName -Force
          }

          Compress-Archive -Path "dist/YotuDrive/*" -DestinationPath $zipName -Force

          $sha = (Get-FileHash $zipName -Algorithm SHA256).Hash
          "${sha}  ${zipName}" | Out-File -FilePath "SHA256SUMS.txt" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yotudrive-${{ github.ref_name }}-windows-x64
          path: |
            YotuDrive-${{ github.ref_name }}-windows-x64.zip
            SHA256SUMS.txt

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YotuDrive-${{ github.ref_name }}-windows-x64.zip
            SHA256SUMS.txt
          generate_release_notes: true
