name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit and smoke tests
        run: |
          python -m unittest \
            tests.test_core_engine \
            tests.test_web_api_smoke \
            tests.test_header_v5_module \
            tests.test_settings_module \
            tests.test_decoder_detection

      - name: Run integration full-cycle
        run: |
          python tests/test_full_cycle.py
