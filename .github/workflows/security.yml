name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit semgrep
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Bandit security linter
      run: |
        bandit -r src -f json -o bandit-report.json
        bandit -r src -f txt -o bandit-report.txt
      continue-on-error: true

    - name: Run Safety dependency check
      run: |
        safety check --json --output safety-report.json
        safety check --text --output safety-report.txt
      continue-on-error: true

    - name: Run pip-audit vulnerability scan
      run: |
        pip-audit --format=json --output=pip-audit-report.json
        pip-audit --format=plain --output=pip-audit-report.txt
      continue-on-error: true

    - name: Run Semgrep static analysis
      run: |
        semgrep --config=auto --json --output=semgrep-report.json src/
        semgrep --config=auto --text --output=semgrep-report.txt src/
      continue-on-error: true

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-scan-results
        path: |
          bandit-report.json
          bandit-report.txt
          safety-report.json
          safety-report.txt
          pip-audit-report.json
          pip-audit-report.txt
          semgrep-report.json
          semgrep-report.txt
          trivy-results.sarif

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Comment PR with security findings
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          // Read security reports
          let findings = [];
          
          try {
            const bandit = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
            if (bandit.results && bandit.results.length > 0) {
              findings.push(`## Bandit Security Issues\nFound ${bandit.results.length} potential security issues:\n`);
              bandit.results.forEach((issue, i) => {
                findings.push(`${i+1}. **${issue.test_name}** (Severity: ${issue.issue_severity})\n   - File: ${issue.filename}:${issue.line_number}\n   - ${issue.issue_text}\n`);
              });
            }
          } catch (e) {}
          
          try {
            const safety = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
            if (safety.vulnerabilities && safety.vulnerabilities.length > 0) {
              findings.push(`## Dependency Vulnerabilities\nFound ${safety.vulnerabilities.length} vulnerable dependencies:\n`);
              safety.vulnerabilities.forEach((vuln, i) => {
                findings.push(`${i+1}. **${vuln.package}** (${vuln.version})\n   - Vulnerability: ${vuln.advisory}\n   - Severity: ${vuln.vulnerability}\n   - CVE: ${vuln.cve || 'N/A'}\n`);
              });
            }
          } catch (e) {}
          
          try {
            const pipAudit = JSON.parse(fs.readFileSync('pip-audit-report.json', 'utf8'));
            if (pipAudit.vulnerabilities && pipAudit.vulnerabilities.length > 0) {
              findings.push(`## Pip-Audit Findings\nFound ${pipAudit.vulnerabilities.length} vulnerabilities:\n`);
              pipAudit.vulnerabilities.forEach((vuln, i) => {
                findings.push(`${i+1}. **${vuln.name}** (${vuln.version})\n   - ${vuln.description}\n`);
              });
            }
          } catch (e) {}
          
          if (findings.length > 0) {
            const comment = `# 🔒 Security Scan Results\n\n${findings.join('\n')}\n\n---\n*This comment was automatically generated by security scanning tools.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run TruffleHog secrets scanner
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        config-path: .gitleaks.toml

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy bandit
        pip install -r requirements.txt

    - name: Run code quality checks
      run: |
        # Code formatting
        black --check --diff src tests
        
        # Import sorting
        isort --check-only --diff src tests
        
        # Linting
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
        # Type checking
        mypy src --ignore-missing-imports --no-strict-optional
        
        # Security linting
        bandit -r src -f json -o bandit-code-quality.json || true

    - name: Upload code quality results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: code-quality-results
        path: |
          bandit-code-quality.json

  dependency-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety pip-audit
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Check for known vulnerabilities
      run: |
        # Safety check
        safety check --json --output safety-deps.json || true
        
        # Pip-audit check
        pip-audit --format=json --output=pip-audit-deps.json || true
        
        # Check for outdated packages
        pip list --outdated --format=json > outdated-packages.json || true

    - name: Generate dependency report
      run: |
        echo "# Dependency Security Report" > dependency-report.md
        echo "" >> dependency-report.md
        
        if [ -f safety-deps.json ]; then
          echo "## Safety Vulnerabilities" >> dependency-report.md
          echo '```json' >> dependency-report.md
          cat safety-deps.json >> dependency-report.md
          echo '```' >> dependency-report.md
          echo "" >> dependency-report.md
        fi
        
        if [ -f pip-audit-deps.json ]; then
          echo "## Pip-Audit Vulnerabilities" >> dependency-report.md
          echo '```json' >> dependency-report.md
          cat pip-audit-deps.json >> dependency-report.md
          echo '```' >> dependency-report.md
          echo "" >> dependency-report.md
        fi
        
        if [ -f outdated-packages.json ]; then
          echo "## Outdated Packages" >> dependency-report.md
          echo '```json' >> dependency-report.md
          cat outdated-packages.json >> dependency-report.md
          echo '```' >> dependency-report.md
        fi

    - name: Upload dependency report
      uses: actions/upload-artifact@v3
      with:
        name: dependency-report
        path: dependency-report.md
